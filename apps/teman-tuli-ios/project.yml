name: TemanTuli
options:
  minimumXcodeGenVersion: 2.38.0
packages: {}
targets:
  TemanTuli:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TemanTuliApp/Sources
    info:
      path: TemanTuliApp/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: Teman Tuli
        NSMicrophoneUsageDescription: Teman Tuli needs microphone access to provide live classroom captions.
        NSSpeechRecognitionUsageDescription: Teman Tuli uses speech recognition to convert voice into live caption text.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sulhan.temantuli
        SWIFT_VERSION: 5.9
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets:
        - TemanTuliTests
        - TemanTuliUITests
  TemanTuliTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TemanTuliApp/Tests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: TemanTuli
  TemanTuliUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TemanTuliApp/UITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: TemanTuli
    dependencies:
      - target: TemanTuli
